<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IICPC Global Leaderboard</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #111111;
            --border-color: #222222;
            --accent-cyan: #00f3ff;
            --accent-green: #00ff66;
            --text-main: #e0e0e0;
            --text-muted: #666666;
            --font-mono: 'Courier New', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-mono);
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            background-image: linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        h1 {
            font-size: 2rem;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .table-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 1000px;
        }

        .row {
            display: grid;
            grid-template-columns: 80px 1fr 150px 300px;
            padding: 1.25rem 1.5rem;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
            transition: background-color 0.2s ease;
        }

        .row:hover { background: rgba(0, 243, 255, 0.02); }
        .row.updated { animation: flash 0.5s ease-out; }

        @keyframes flash {
            0% { background-color: rgba(0, 255, 102, 0.2); }
            100% { background-color: transparent; }
        }

        .col-rank { font-size: 1.2rem; font-weight: bold; color: var(--text-muted); }
        .col-score { font-size: 1.5rem; font-weight: 700; color: var(--accent-cyan); }

        .bar-bg { width: 100%; height: 6px; background: #222; border-radius: 3px; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #00f3ff, #00ff66); transition: width 0.4s; }
    </style>
</head>
<body>
    <h1>IICPC BENCHMARK ENGINE: Live Telemetry</h1>
    <div class="table-container" id="board">
        <div style="padding: 2rem; text-align: center; color: #666;">AWAITING DATA STREAM...</div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}`);
        let previousState = new Map();

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'update' && msg.data.length > 0) {
                const highestScore = Math.max(100, msg.data[0].score);
                const board = document.getElementById('board');

                board.innerHTML = msg.data.map((team, idx) => {
                    const score = parseFloat(team.score).toFixed(2);
                    const width = Math.max(5, (score / highestScore) * 100);

                    let updatedClass = '';
                    if (previousState.get(team.value) !== score) {
                        updatedClass = 'updated';
                    }
                    previousState.set(team.value, score);

                    return `
                    <div class="row ${updatedClass}">
                        <div class="col-rank">#${idx + 1}</div>
                        <div style="font-weight: bold;">${team.value}</div>
                        <div class="col-score">${score}</div>
                        <div>
                            <div class="bar-bg"><div class="bar-fill" style="width: ${width}%"></div></div>
                        </div>
                    </div>`;
                }).join('');
            }
        };
    </script>
</body>
</html>
